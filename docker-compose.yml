services:
  postgres-master:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5433:5432"
    volumes:
      - pgdata-master:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 15

  postgres-slave:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: appdb
    ports:
      - "5434:5432"
    volumes:
      - pgdata-slave:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d appdb"]
      interval: 2s
      timeout: 3s
      retries: 15

  writer:
    build: ./app
    profiles:
      - writer
    environment:
      DB_HOSTS: postgres-master,postgres-slave
      DB_PORT: 5432
      DB_NAME: appdb
      DB_USER: postgres
      DB_PASSWORD: postgres
      WRITE_INTERVAL_SECONDS: 1
      RETRY_INITIAL_DELAY_SECONDS: 1
      RETRY_MAX_DELAY_SECONDS: 5
    depends_on:
      postgres-master:
        condition: service_healthy
      postgres-slave:
        condition: service_healthy

volumes:
  pgdata-master:
  pgdata-slave:
